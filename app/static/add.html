<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKUP - Add Evidence</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav>
    <span class="brand">AKUP Evidence</span>
    <a href="/static/dashboard.html">Dashboard</a>
    <a href="/static/add.html">Add Evidence</a>
    <a href="#" id="logout">Logout</a>
  </nav>

  <main>
    <h2>Add Evidence Record</h2>
    <div id="message"></div>

    <form id="add-form">
      <label>
        User
        <select id="user-id" required>
          <option value="">Select user...</option>
        </select>
      </label>

      <label>
        Commit SHA
        <input type="text" id="commit-sha" required minlength="7" maxlength="40"
               placeholder="e.g. a1b2c3d4e5f6">
      </label>

      <label>
        Repository URL
        <input type="url" id="repo-url" required
               placeholder="e.g. https://github.com/org/repo">
      </label>

      <label>
        Description of creative work
        <textarea id="description" required maxlength="2000" rows="4"
                  placeholder="Describe the creative/authorial work performed..."></textarea>
      </label>

      <label>
        Date of work
        <input type="date" id="evidence-date" required>
      </label>

      <button type="submit">Save Evidence</button>
    </form>
  </main>

  <script src="/static/js/app.js"></script>
  <script>
    requireAuth();

    // Set default date to today
    document.getElementById("evidence-date").valueAsDate = new Date();

    async function loadUsers() {
      const select = document.getElementById("user-id");
      try {
        const users = await api("GET", "/api/v1/users");
        users.forEach(u => {
          const opt = document.createElement("option");
          opt.value = u.id;
          opt.textContent = `${u.name} (${u.email})`;
          select.appendChild(opt);
        });
      } catch (err) {
        showMessage(document.getElementById("message"), "Failed to load users: " + err.message, "error");
      }
    }

    document.getElementById("add-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("message");
      try {
        await api("POST", "/api/v1/evidence", {
          commit_sha: document.getElementById("commit-sha").value.trim(),
          repo_url: document.getElementById("repo-url").value.trim(),
          description: document.getElementById("description").value.trim(),
          evidence_date: document.getElementById("evidence-date").value,
          created_by_user_id: document.getElementById("user-id").value,
        });
        window.location.href = "/static/dashboard.html";
      } catch (err) {
        showMessage(msg, "Failed to save: " + err.message, "error");
      }
    });

    document.getElementById("logout").addEventListener("click", (e) => {
      e.preventDefault();
      clearApiKey();
      window.location.href = "/static/index.html";
    });

    loadUsers();
  </script>
</body>
</html>
