<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKUP - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main>
    <hgroup>
      <h1>AKUP Evidence</h1>
      <p>Enter your organization's API key to continue</p>
    </hgroup>

    <form id="login-form">
      <label for="api-key">API Key</label>
      <input type="text" id="api-key" name="api_key" placeholder="Paste your API key here" required>
      <small>Get an API key by creating an organization via the CLI: <code>akup org create "My Company"</code></small>
      <button type="submit">Connect</button>
    </form>

    <div id="message"></div>
  </main>

  <script src="/static/js/app.js"></script>
  <script>
    // If already logged in, go to dashboard
    if (getApiKey()) {
      window.location.href = "/static/dashboard.html";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const key = document.getElementById("api-key").value.trim();
      if (!key) return;

      // Verify the key works
      try {
        const resp = await fetch("/api/v1/users", {
          headers: { "X-API-Key": key }
        });
        if (resp.status === 401) {
          showMessage(document.getElementById("message"), "Invalid API key", "error");
          return;
        }
        setApiKey(key);
        window.location.href = "/static/dashboard.html";
      } catch (err) {
        showMessage(document.getElementById("message"), "Connection failed: " + err.message, "error");
      }
    });
  </script>
</body>
</html>
